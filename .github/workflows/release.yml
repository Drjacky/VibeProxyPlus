name: Build and Release

# Build ZIP/DMG and attach to a GitHub Release (draft by default).
#
# Triggers:
#   1. workflow_dispatch — Actions → "Build and Release" → set version, optional draft/publish
#   2. release created (draft) — Releases → Draft new release with tag v* → CI builds and uploads assets
#   3. push tag v* — git push origin v10.8.163 (builds as draft release)
#
# Pushing to main does NOT release. Auto-release pushes v10.* tags after CLIProxy bumps.
#
# Tag pushes use the workflow file AT THE TAGGED COMMIT. Re-tag main after workflow changes:
#   git tag -fa v10.8.162 && git push origin :refs/tags/v10.8.162 && git push origin v10.8.162

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 10.8.162). Tag will be v<version>.'
        required: true
      draft:
        description: 'Save as draft release on GitHub'
        type: boolean
        default: true
      publish:
        description: 'Publish immediately (only if draft is false)'
        type: boolean
        default: false
  release:
    types: [created]

permissions:
  contents: write
  # Required when default GITHUB_TOKEN is read-only at repo/org level
  actions: read

concurrency:
  group: release-${{ github.event.release.tag_name || format('manual-{0}', github.event.inputs.version) || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve release target
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      draft: ${{ steps.meta.outputs.draft }}
      publish: ${{ steps.meta.outputs.publish }}
      should_run: ${{ steps.meta.outputs.should_run }}
    steps:
      - name: Resolve version and tag
        id: meta
        run: |
          set -e
          SHOULD_RUN=true
          DRAFT=true
          PUBLISH=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            DRAFT="${{ github.event.inputs.draft }}"
            PUBLISH="${{ github.event.inputs.publish }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            DRAFT="${{ github.event.release.draft }}"
            if [ "$DRAFT" != "true" ]; then
              echo "Skipping: release was created as published (not a draft). Use draft releases to trigger builds."
              SHOULD_RUN=false
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            DRAFT=true
            PUBLISH=false
          else
            echo "Unsupported event: ${{ github.event_name }}"
            SHOULD_RUN=false
          fi

          if [ "$SHOULD_RUN" = "true" ]; then
            if [ -z "$VERSION" ]; then
              echo "Version is empty" >&2
              exit 1
            fi
            TAG_NAME="v${VERSION}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          fi

          echo "draft=$DRAFT" >> $GITHUB_OUTPUT
          echo "publish=$PUBLISH" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT

  get-cliproxy-version:
    name: Get CLIProxyAPIPlus Version
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Get latest CLIProxyAPIPlus release
        id: get_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release view --repo kaitranntt/CLIProxyAPIPlus --json tagName -q '.tagName')
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.arch }})
    needs: [resolve, get-cliproxy-version]
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        # arm64 only for now. x86_64 cross-build on Apple Silicon runners is flaky
        # (setup-swift / SDKSettings.plist). Re-add when Intel CI is validated.
        include:
          - arch: arm64
            cliproxy_asset_regex: darwin_(aarch64|arm64)
            swift_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && needs.resolve.outputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Resolve app version
        id: app_version
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Download CLIProxyAPIPlus for ${{ matrix.arch }}
        id: cliproxy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          LATEST_TAG="${{ needs.get-cliproxy-version.outputs.tag }}"
          RELEASE_JSON=$(gh api "repos/kaitranntt/CLIProxyAPIPlus/releases/tags/$LATEST_TAG")
          ASSET_REGEX="^CLIProxyAPIPlus_.+_${{ matrix.cliproxy_asset_regex }}\\.tar\\.gz$"
          URL=$(echo "$RELEASE_JSON" | jq -r --arg regex "$ASSET_REGEX" '.assets[] | select(.name | test($regex)) | .browser_download_url' | head -n 1)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No CLIProxyAPIPlus asset for ${{ matrix.arch }}; skipping."
            exit 0
          fi
          curl -L -f --retry 3 --retry-delay 5 -o cliproxy.tar.gz "$URL"
          mkdir -p src/Sources/Resources
          TEMP_DIR=$(mktemp -d)
          tar -xzf cliproxy.tar.gz -C "$TEMP_DIR"
          BINARY=$(find "$TEMP_DIR" -type f \( -name "CLIProxyAPIPlus" -o -name "cli-proxy-api-plus" \) | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find "$TEMP_DIR" -type f -perm +111 | head -1)
          fi
          test -n "$BINARY"
          cp "$BINARY" src/Sources/Resources/cli-proxy-api-plus
          chmod +x src/Sources/Resources/cli-proxy-api-plus

      - name: Build app bundle
        if: steps.cliproxy.outputs.skip != 'true'
        env:
          APP_VERSION: ${{ steps.app_version.outputs.VERSION }}
          TARGET_ARCH: ${{ matrix.swift_arch }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          chmod +x create-app-bundle.sh
          ./create-app-bundle.sh

      - name: Detect signature and name artifacts
        id: package
        if: steps.cliproxy.outputs.skip != 'true'
        run: |
          set -e
          codesign --verify --deep --strict VibeProxyPlus.app
          codesign -dv VibeProxyPlus.app 2>&1 | tee codesign.txt

          if grep -q 'Authority=Developer ID Application' codesign.txt; then
            SIGN_LABEL=signed
            echo "Signed with Apple Developer ID"
          else
            SIGN_LABEL=unsigned
            echo "Ad-hoc signed (unsigned distribution)"
          fi

          echo "sign_label=${SIGN_LABEL}" >> $GITHUB_OUTPUT
          ZIP="VibeProxyPlus-${{ matrix.arch }}-${SIGN_LABEL}.zip"
          DMG="VibeProxyPlus-${{ matrix.arch }}-${SIGN_LABEL}.dmg"

          ditto -c -k --sequesterRsrc --keepParent "VibeProxyPlus.app" "$ZIP"
          shasum -a 256 "$ZIP" > "${ZIP}.sha256"
          echo "zip_name=${ZIP}" >> $GITHUB_OUTPUT

          brew install create-dmg
          DMG_ARGS=(
            --volname "VibeProxyPlus"
            --volicon "icon.png"
            --window-pos 200 120
            --window-size 600 400
            --icon-size 100
            --icon "VibeProxyPlus.app" 175 120
            --hide-extension "VibeProxyPlus.app"
            --app-drop-link 425 120
          )
          if [ "$SIGN_LABEL" = "signed" ] && [ -n "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}" ]; then
            DMG_ARGS+=(--codesign "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}")
          fi
          create-dmg "${DMG_ARGS[@]}" "$DMG" "VibeProxyPlus.app" || true
          if [ -f "$DMG" ]; then
            shasum -a 256 "$DMG" > "${DMG}.sha256"
            echo "dmg_name=${DMG}" >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifacts
        if: steps.cliproxy.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vibeproxyplus-${{ matrix.arch }}-${{ steps.package.outputs.sign_label }}
          path: |
            VibeProxyPlus-${{ matrix.arch }}-*.zip
            VibeProxyPlus-${{ matrix.arch }}-*.zip.sha256
            VibeProxyPlus-${{ matrix.arch }}-*.dmg
            VibeProxyPlus-${{ matrix.arch }}-*.dmg.sha256
          if-no-files-found: error
          retention-days: 5

  release:
    name: Upload to GitHub Release
    needs: [resolve, get-cliproxy-version, build]
    # Run when at least one matrix leg succeeded (do not skip upload if another arch failed).
    if: >-
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.get-cliproxy-version.result == 'success' &&
      needs.build.result != 'cancelled' &&
      contains(fromJSON('["success","failure"]'), needs.build.result)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vibeproxyplus-*
          merge-multiple: true

      - name: Prepare release assets and signing summary
        id: summary
        run: |
          set -e
          mkdir -p release
          if [ ! -d artifacts ] || [ -z "$(find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.sha256' \) -print -quit 2>/dev/null)" ]; then
            echo "No build artifacts found. At least one build (arm64) must succeed before release upload." >&2
            find artifacts -type f 2>/dev/null || true
            exit 1
          fi
          find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/
          test "$(ls -1 release/*.zip 2>/dev/null | wc -l)" -gt 0

          HAS_UNSIGNED=false
          HAS_SIGNED=false
          ls release/*-unsigned.zip 2>/dev/null && HAS_UNSIGNED=true || true
          ls release/*-signed.zip 2>/dev/null && HAS_SIGNED=true || true

          echo "has_unsigned=${HAS_UNSIGNED}" >> $GITHUB_OUTPUT
          echo "has_signed=${HAS_SIGNED}" >> $GITHUB_OUTPUT

          FILE_LIST=$(ls -1 release/*.zip release/*.dmg 2>/dev/null | xargs -I{} basename {} | paste -sd ',' -)
          echo "file_list=${FILE_LIST}" >> $GITHUB_OUTPUT

          DRAFT="${{ needs.resolve.outputs.draft }}"
          PUBLISH="${{ needs.resolve.outputs.publish }}"
          if [ "$DRAFT" = "true" ]; then
            echo "publish_release=false" >> $GITHUB_OUTPUT
          elif [ "$PUBLISH" = "true" ]; then
            echo "publish_release=true" >> $GITHUB_OUTPUT
          else
            echo "publish_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
          DRAFT: ${{ needs.resolve.outputs.draft }}
          FILE_LIST: ${{ steps.summary.outputs.file_list }}
          PUBLISH: ${{ steps.summary.outputs.publish_release }}
        run: |
          set -e
          if [ -z "${GH_TOKEN}" ]; then
            echo "AUTO_UPDATE_TOKEN repository secret is missing or empty." >&2
            exit 1
          fi
          gh auth status

          cat > release-notes.md <<EOF
          ## VibeProxyPlus — ${{ github.repository }}

          Built by GitHub Actions. Includes **Cursor provider** support (CLIProxyAPIPlus).

          ### Code signing (read the filename)

          | Suffix | Meaning |
          |--------|---------|
          | \`-unsigned\` | Ad-hoc only — **Right-click → Open** on first launch. |
          | \`-signed\` | Apple Developer ID (if signing secrets were set). |

          **Assets:** ${FILE_LIST}

          ### Install

          1. Download \`*-arm64-*\` ZIP for Apple Silicon.
          2. Extract and move \`VibeProxyPlus.app\` to **Applications**.
          3. For \`*-unsigned*\`: **right-click** → **Open** → **Open**.

          ### Verify checksum

          \`shasum -a 256 -c VibeProxyPlus-arm64-unsigned.zip.sha256\`
          EOF

          DRAFT_ARGS=()
          if [ "$DRAFT" = "true" ]; then
            DRAFT_ARGS=(--draft)
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            gh release edit "$TAG" --repo "${{ github.repository }}" \
              --title "VibeProxyPlus ${VERSION}" \
              --notes-file release-notes.md \
              "${DRAFT_ARGS[@]}"
          else
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "VibeProxyPlus ${VERSION}" \
              --notes-file release-notes.md \
              "${DRAFT_ARGS[@]}"
          fi

          for f in release/*; do
            echo "Uploading $(basename "$f")..."
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
          done

          if [ "$PUBLISH" = "true" ]; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
          fi

          echo "Release $TAG ready:"
          gh release view "$TAG" --repo "${{ github.repository }}"
