name: Build and Release

# Publishes to this repository's Releases page.
# Uses Developer ID when GitHub secrets + cert import are configured; otherwise ad-hoc (unsigned).
# Artifact names include -unsigned or -signed so the release page is explicit.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label when not triggered by a v* tag (workflow_dispatch only).'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  get-cliproxy-version:
    name: Get CLIProxyAPIPlus Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Get latest CLIProxyAPIPlus release
        id: get_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release view --repo kaitranntt/CLIProxyAPIPlus --json tagName -q '.tagName')
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.arch }})
    needs: get-cliproxy-version
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            cliproxy_asset_regex: darwin_(aarch64|arm64)
            swift_arch: arm64
          - arch: x86_64
            cliproxy_asset_regex: darwin_amd64
            swift_arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Import code signing certificates (optional)
        uses: apple-actions/import-codesign-certs@v2
        continue-on-error: true
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Resolve app version
        id: app_version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0-dev")
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Download CLIProxyAPIPlus for ${{ matrix.arch }}
        id: cliproxy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          LATEST_TAG="${{ needs.get-cliproxy-version.outputs.tag }}"
          RELEASE_JSON=$(gh api "repos/kaitranntt/CLIProxyAPIPlus/releases/tags/$LATEST_TAG")
          ASSET_REGEX="^CLIProxyAPIPlus_.+_${{ matrix.cliproxy_asset_regex }}\\.tar\\.gz$"
          URL=$(echo "$RELEASE_JSON" | jq -r --arg regex "$ASSET_REGEX" '.assets[] | select(.name | test($regex)) | .browser_download_url' | head -n 1)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No CLIProxyAPIPlus asset for ${{ matrix.arch }}; skipping."
            exit 0
          fi
          curl -L -f --retry 3 --retry-delay 5 -o cliproxy.tar.gz "$URL"
          mkdir -p src/Sources/Resources
          TEMP_DIR=$(mktemp -d)
          tar -xzf cliproxy.tar.gz -C "$TEMP_DIR"
          BINARY=$(find "$TEMP_DIR" -type f \( -name "CLIProxyAPIPlus" -o -name "cli-proxy-api-plus" \) | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find "$TEMP_DIR" -type f -perm +111 | head -1)
          fi
          test -n "$BINARY"
          cp "$BINARY" src/Sources/Resources/cli-proxy-api-plus
          chmod +x src/Sources/Resources/cli-proxy-api-plus

      - name: Build app bundle
        if: steps.cliproxy.outputs.skip != 'true'
        env:
          APP_VERSION: ${{ steps.app_version.outputs.VERSION }}
          TARGET_ARCH: ${{ matrix.swift_arch }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          chmod +x create-app-bundle.sh
          ./create-app-bundle.sh

      - name: Detect signature and name artifacts
        id: package
        if: steps.cliproxy.outputs.skip != 'true'
        run: |
          set -e
          codesign --verify --deep --strict VibeProxy.app
          codesign -dv VibeProxy.app 2>&1 | tee codesign.txt

          if grep -q 'Authority=Developer ID Application' codesign.txt; then
            SIGN_LABEL=signed
            echo "Signed with Apple Developer ID"
          else
            SIGN_LABEL=unsigned
            echo "Ad-hoc signed (unsigned distribution)"
          fi

          echo "sign_label=${SIGN_LABEL}" >> $GITHUB_OUTPUT
          ZIP="VibeProxy-${{ matrix.arch }}-${SIGN_LABEL}.zip"
          DMG="VibeProxy-${{ matrix.arch }}-${SIGN_LABEL}.dmg"

          ditto -c -k --sequesterRsrc --keepParent "VibeProxy.app" "$ZIP"
          shasum -a 256 "$ZIP" > "${ZIP}.sha256"
          echo "zip_name=${ZIP}" >> $GITHUB_OUTPUT

          brew install create-dmg
          DMG_ARGS=(
            --volname "VibeProxy"
            --volicon "icon.png"
            --window-pos 200 120
            --window-size 600 400
            --icon-size 100
            --icon "VibeProxy.app" 175 120
            --hide-extension "VibeProxy.app"
            --app-drop-link 425 120
          )
          if [ "$SIGN_LABEL" = "signed" ] && [ -n "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}" ]; then
            DMG_ARGS+=(--codesign "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}")
          fi
          create-dmg "${DMG_ARGS[@]}" "$DMG" "VibeProxy.app" || true
          if [ -f "$DMG" ]; then
            shasum -a 256 "$DMG" > "${DMG}.sha256"
            echo "dmg_name=${DMG}" >> $GITHUB_OUTPUT
          fi

      - name: Upload build artifacts
        if: steps.cliproxy.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vibeproxy-${{ matrix.arch }}-${{ steps.package.outputs.sign_label }}
          path: |
            VibeProxy-${{ matrix.arch }}-*.zip
            VibeProxy-${{ matrix.arch }}-*.zip.sha256
            VibeProxy-${{ matrix.arch }}-*.dmg
            VibeProxy-${{ matrix.arch }}-*.dmg.sha256
          if-no-files-found: error
          retention-days: 5

  release:
    name: Publish GitHub Release
    needs: [get-cliproxy-version, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: vibeproxy-*
          merge-multiple: true

      - name: Prepare release assets and signing summary
        id: summary
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release/
          test "$(ls -1 release/*.zip 2>/dev/null | wc -l)" -gt 0

          HAS_UNSIGNED=false
          HAS_SIGNED=false
          ls release/*-unsigned.zip 2>/dev/null && HAS_UNSIGNED=true || true
          ls release/*-signed.zip 2>/dev/null && HAS_SIGNED=true || true

          echo "has_unsigned=${HAS_UNSIGNED}" >> $GITHUB_OUTPUT
          echo "has_signed=${HAS_SIGNED}" >> $GITHUB_OUTPUT

          FILE_LIST=$(ls -1 release/*.zip release/*.dmg 2>/dev/null | xargs -I{} basename {} | paste -sd ',' -)
          echo "file_list=${FILE_LIST}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## VibeProxy — ${{ github.repository }}

            Built by GitHub Actions. Includes **Cursor provider** support (CLIProxyAPIPlus).

            ### Code signing (read the filename)

            | Suffix | Meaning |
            |--------|---------|
            | `-unsigned` | Ad-hoc only — not Apple Developer ID, not notarized. **Right-click → Open** on first launch. |
            | `-signed` | Signed with Apple Developer ID (repo secrets were set). Notarization is not included unless you extend the workflow. |

            **Assets in this release:** ${{ steps.summary.outputs.file_list }}

            ### Install

            1. Download the ZIP for your Mac (`*-arm64-*` or `*-x86_64-*`).
            2. Extract and move `VibeProxy.app` to **Applications**.
            3. For `*-unsigned*` builds: **right-click** → **Open** → confirm **Open**.

            ### Verify checksum

            Match the `.sha256` file to the ZIP you downloaded, e.g. `shasum -a 256 -c VibeProxy-arm64-unsigned.zip.sha256`.

            ### Cursor setup

            [CURSOR_SETUP.md](https://github.com/${{ github.repository }}/blob/main/CURSOR_SETUP.md)

            ### Developer ID (optional)

            Add secrets `APPLE_DEVELOPER_CERTIFICATE_P12_BASE64`, `APPLE_DEVELOPER_CERTIFICATE_PASSWORD`, and `APPLE_DEVELOPER_ID_APPLICATION` to produce `*-signed*` artifacts on the next tag push.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
