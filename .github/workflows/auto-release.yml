name: Auto Release

# After Update CLIProxyAPI opens a bump PR: merge it, bump VibeProxyPlus 10.x.y, tag, push.
# Tag push triggers Build and Release (draft). Pushes to main alone do not run this workflow.

on:
  schedule:
    - cron: '30 */12 * * *' # Backup: 30 min after update-cliproxyapi schedule
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: auto-release
  cancel-in-progress: true

env:
  CLIPROXY_REPO: kaitranntt/CLIProxyAPIPlus
  CLIPROXY_RELEASES_URL: https://github.com/kaitranntt/CLIProxyAPIPlus/releases

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}
          fetch-depth: 0

      - name: Check for open CLIProxyAPI bump PRs
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          set -e
          echo "Checking for open CLIProxyAPIPlus bump PRs..."
          
          PR_JSON=$(gh pr list --state open --json number,headRefName,title --jq '.[] | select(.headRefName | startswith("bump-cliproxyapi-"))' | head -1)
          
          if [ -z "$PR_JSON" ]; then
            echo "No open CLIProxyAPI bump PRs found."
            echo "has_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
          
          CLIPROXY_VERSION=$(echo "$PR_BRANCH" | sed 's/bump-cliproxyapi-//')
          
          echo "Found PR #$PR_NUMBER: $PR_TITLE"
          echo "CLIProxyAPIPlus version: $CLIPROXY_VERSION"
          
          echo "has_pr=true" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "cliproxy_version=$CLIPROXY_VERSION" >> $GITHUB_OUTPUT

      - name: Merge PR
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          set -e
          PR_NUMBER="${{ steps.check-pr.outputs.pr_number }}"
          
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          
          echo "PR #$PR_NUMBER merged successfully"

      - name: Checkout main after merge
        if: steps.check-pr.outputs.has_pr == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}
          fetch-depth: 0

      - name: Calculate new VibeProxyPlus version (10.x.y only)
        if: steps.check-pr.outputs.has_pr == 'true'
        id: version
        run: |
          set -e
          
          # Only v10.* tags count as app releases (ignore upstream-style v1.* tags if any)
          CURRENT_TAG=$(git tag -l 'v10.*' --sort=-v:refname | head -n 1 || true)
          if [ -n "$CURRENT_TAG" ]; then
            CURRENT_VERSION="${CURRENT_TAG#v}"
          else
            CURRENT_VERSION=$(awk '/CFBundleShortVersionString/{getline; gsub(/.*<string>|<\/string>.*/,""); print; exit}' src/Info.plist)
          fi
          
          if [ -z "$CURRENT_VERSION" ]; then
            CURRENT_VERSION="10.8.162"
          fi
          
          echo "Current VibeProxyPlus version: $CURRENT_VERSION"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          if [ "$MAJOR" != "10" ]; then
            echo "Error: VibeProxyPlus uses 10.x.y versioning; got major=$MAJOR from $CURRENT_VERSION" >&2
            exit 1
          fi
          
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="10.${MINOR}.${NEW_PATCH}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          
          echo "New version: $NEW_VERSION (build $BUILD_NUMBER)"
          
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md and Info.plist
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          CLIPROXY_VERSION: ${{ steps.check-pr.outputs.cliproxy_version }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          PR_NUMBER: ${{ steps.check-pr.outputs.pr_number }}
        run: |
          set -e
          
          TODAY=$(date +%Y-%m-%d)
          REPO="${{ github.repository }}"
          
          head -n 7 CHANGELOG.md > CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          printf '%s\n' "## [${NEW_VERSION}] - ${TODAY}" >> CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          printf '%s\n' "### Updated" >> CHANGELOG.tmp
          printf '%s\n' "- **CLIProxyAPIPlus ${CLIPROXY_VERSION}** - [kaitranntt/CLIProxyAPIPlus](https://github.com/kaitranntt/CLIProxyAPIPlus) (#${PR_NUMBER})" >> CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          tail -n +8 CHANGELOG.md >> CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          
          LINK_LINE="[${NEW_VERSION}]: https://github.com/${REPO}/releases/tag/v${NEW_VERSION}"
          sed -i.bak "0,/^\[.*\]: https:\\/\\/github.com\\/.*\\/releases\\/tag\\/v/s||${LINK_LINE}\n&|" CHANGELOG.md
          rm -f CHANGELOG.md.bak
          
          sed -i.bak "/CFBundleShortVersionString/,+1 s|<string>.*</string>|<string>${NEW_VERSION}</string>|" src/Info.plist
          sed -i.bak "/CFBundleVersion/,+1 s|<string>.*</string>|<string>${BUILD_NUMBER}</string>|" src/Info.plist
          rm -f src/Info.plist.bak
          
          echo "CHANGELOG.md and src/Info.plist updated"
          head -n 20 CHANGELOG.md
          grep -A1 'CFBundleShortVersionString\|CFBundleVersion' src/Info.plist

      - name: Commit, tag, and push
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          set -e
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md src/Info.plist
          git commit -m "Release v${NEW_VERSION} (CLIProxyAPIPlus bump)"
          
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          
          git push origin main
          git push origin "v${NEW_VERSION}"
          
          echo "Created and pushed tag v${NEW_VERSION}"
          echo "Build and Release will run for tag v${NEW_VERSION} (draft)"

      - name: Summary
        if: steps.check-pr.outputs.has_pr == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          CLIPROXY_VERSION: ${{ steps.check-pr.outputs.cliproxy_version }}
          PR_NUMBER: ${{ steps.check-pr.outputs.pr_number }}
        run: |
          echo "## Auto Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR #$PR_NUMBER merged** - CLIProxyAPIPlus \`${CLIPROXY_VERSION}\` from [kaitranntt/CLIProxyAPIPlus](https://github.com/kaitranntt/CLIProxyAPIPlus)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**VibeProxyPlus version** - \`v${NEW_VERSION}\` (10.x.y)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next** - [Build and Release](../../actions/workflows/release.yml) uploads draft assets for \`v${NEW_VERSION}\`" >> $GITHUB_STEP_SUMMARY
