name: Update CLIProxyAPI

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours (00:00 and 12:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: update-cliproxyapi
  cancel-in-progress: true

jobs:
  update-cliproxyapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Close old unmerged bump PRs
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          set -e
          echo "Checking for existing auto-generated bump PRs..."
          
          OLD_PRS=$(gh pr list --state open --json number,headRefName,title --jq '.[] | select(.headRefName | startswith("bump-cliproxyapi-")) | "\(.number)|\(.title)"' || true)
          
          if [ -z "$OLD_PRS" ]; then
            echo "No existing auto-generated bump PRs found."
          else
            echo "Found existing auto-generated bump PRs to close:"
            
            while IFS='|' read -r PR_NUMBER PR_TITLE; do
              if [ -n "$PR_NUMBER" ]; then
                echo "Closing PR #$PR_NUMBER: $PR_TITLE"
                gh pr close "$PR_NUMBER" --comment "Closing this PR as a newer version bump is being created." || {
                  echo "Warning: Failed to close PR #$PR_NUMBER" >&2
                }
              fi
            done <<< "$OLD_PRS"
            
            echo "✓ Closed old auto-generated bump PRs"
          fi

      - name: Get latest CLIProxyAPIPlus release
        id: get-latest-release
        run: |
          set -e
          LATEST_JSON=$(curl -s -f https://api.github.com/repos/kaitranntt/CLIProxyAPIPlus/releases/latest)
          
          if [ -z "$LATEST_JSON" ]; then
            echo "Error: Failed to fetch latest release JSON" >&2
            exit 1
          fi

          # Ensure pure JSON by stripping potential non-printable characters if any
          LATEST_TAG=$(echo "$LATEST_JSON" | tr -d '\000-\037' | jq -r .tag_name)
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "Error: Failed to extract tag_name from JSON" >&2
            exit 1
          fi

          VERSION=${LATEST_TAG#v}
          
          if [ -z "$VERSION" ]; then
            echo "Error: Version string is empty" >&2
            exit 1
          fi

          DARWIN_ASSET_NAME=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | test("^CLIProxyAPIPlus_.+_darwin_(aarch64|arm64)\\.tar\\.gz$")) | .name' | head -n 1)
          DARWIN_ASSET_URL=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | test("^CLIProxyAPIPlus_.+_darwin_(aarch64|arm64)\\.tar\\.gz$")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DARWIN_ASSET_NAME" ] || [ "$DARWIN_ASSET_NAME" = "null" ] || [ -z "$DARWIN_ASSET_URL" ] || [ "$DARWIN_ASSET_URL" = "null" ]; then
            echo "Error: Failed to find a Darwin ARM CLIProxyAPIPlus asset in latest release" >&2
            echo "Available assets:" >&2
            echo "$LATEST_JSON" | jq -r '.assets[].name' >&2
            exit 1
          fi

          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "darwin_asset_name=$DARWIN_ASSET_NAME" >> $GITHUB_OUTPUT
          echo "darwin_asset_url=$DARWIN_ASSET_URL" >> $GITHUB_OUTPUT
          echo "Found latest version: $VERSION"

      - name: Download and Install CLIProxyAPIPlus
        run: |
          set -e
          FILENAME="${{ steps.get-latest-release.outputs.darwin_asset_name }}"
          URL="${{ steps.get-latest-release.outputs.darwin_asset_url }}"
          TARGET_DIR="src/Sources/Resources"
          TARGET_FILE="$TARGET_DIR/cli-proxy-api-plus"
          VERSION_FILE="$TARGET_DIR/cli-proxy-api-plus.version"
          VERSION="${{ steps.get-latest-release.outputs.version }}"
          LATEST_TAG="${{ steps.get-latest-release.outputs.latest_tag }}"
          
          # Create a temporary directory for extraction
          TEMP_DIR=$(mktemp -d)
          # Ensure cleanup on exit (success or failure)
          trap 'rm -rf "$TEMP_DIR"' EXIT
          echo "Using temporary directory: $TEMP_DIR"
          
          echo "Downloading $URL..."
          if ! wget -q -O "$TEMP_DIR/$FILENAME" "$URL"; then
            echo "Error: Failed to download $URL" >&2
            exit 1
          fi
          
          if [ ! -s "$TEMP_DIR/$FILENAME" ]; then
             echo "Error: Downloaded file is empty" >&2
             exit 1
          fi
          
          echo "Validating tarball..."
          if ! tar -tzf "$TEMP_DIR/$FILENAME" > /dev/null; then
             echo "Error: Invalid tarball" >&2
             exit 1
          fi
          
          echo "Extracting to temporary directory..."
          tar -xzf "$TEMP_DIR/$FILENAME" -C "$TEMP_DIR"
          
          # Find the binary file - look for expected CLIProxyAPI binary names
          # These are the expected binary names, not documentation or config files
          EXTRACTED_FILE=$(tar -tf "$TEMP_DIR/$FILENAME" | grep -E '^(cli-proxy-api|CLIProxyAPI|cli-proxy-api-plus|CLIProxyAPIPlus)$' | head -n 1)
          
          # If not found by exact name, exclude all known non-binary files
          if [ -z "$EXTRACTED_FILE" ]; then
            EXTRACTED_FILE=$(tar -tf "$TEMP_DIR/$FILENAME" | grep -v -E '(LICENSE|README|\.md$|\.txt$|\.yaml$|\.yml$|\.json$)' | head -n 1)
          fi
          
          if [ -z "$EXTRACTED_FILE" ]; then
             echo "Error: Could not find binary in tarball" >&2
             echo "Tarball contents:" >&2
             tar -tf "$TEMP_DIR/$FILENAME" >&2
             exit 1
          fi
          
          echo "Found binary: $EXTRACTED_FILE"
          
          if [ ! -f "$TEMP_DIR/$EXTRACTED_FILE" ]; then
             echo "Error: Extraction failed, $EXTRACTED_FILE not found" >&2
             exit 1
          fi
          
          echo "Creating target directory..."
          mkdir -p "$TARGET_DIR"
          
          VERIFY_FILE="$TEMP_DIR/cli-proxy-api-plus"
          echo "Copying $EXTRACTED_FILE to $VERIFY_FILE for verification"
          cp "$TEMP_DIR/$EXTRACTED_FILE" "$VERIFY_FILE"
          chmod +x "$VERIFY_FILE"

          FILE_SIZE=$(stat -c%s "$VERIFY_FILE" 2>/dev/null || stat -f%z "$VERIFY_FILE" 2>/dev/null)
          if [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" -lt 1048576 ]; then
             echo "Error: Binary file is too small (${FILE_SIZE:-0} bytes)" >&2
             exit 1
          fi

          if command -v file >/dev/null 2>&1; then
            FILE_TYPE=$(file "$VERIFY_FILE")
            echo "File type: $FILE_TYPE"
            if ! echo "$FILE_TYPE" | grep -q -E "(Mach-O|executable)"; then
              echo "Warning: File type doesn't look like a binary executable" >&2
            fi
          fi

          echo "✓ Binary verification passed (${FILE_SIZE} bytes)"

          echo "$VERSION" > "$VERSION_FILE"
          echo "Recorded version ${VERSION} (${LATEST_TAG}) in $VERSION_FILE"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.AUTO_UPDATE_TOKEN }}
          commit-message: Bump CLIProxyAPI to ${{ steps.get-latest-release.outputs.version }}
          title: Bump CLIProxyAPI to ${{ steps.get-latest-release.outputs.version }}
          body: |
            Updates bundled CLIProxyAPIPlus to version [${{ steps.get-latest-release.outputs.version }}](https://github.com/kaitranntt/CLIProxyAPIPlus/releases/tag/${{ steps.get-latest-release.outputs.latest_tag }}).
            
            This PR was automatically generated by the Update CLIProxyAPI workflow.
            Backend source: [kaitranntt/CLIProxyAPIPlus](https://github.com/kaitranntt/CLIProxyAPIPlus) (Cursor provider / `-cursor-login`).
          branch: bump-cliproxyapi-${{ steps.get-latest-release.outputs.version }}
          delete-branch: true

      - name: Notify about new PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          PR_URL="${{ steps.create-pr.outputs.pull-request-url }}"
          VERSION="${{ steps.get-latest-release.outputs.version }}"
          LATEST_TAG="${{ steps.get-latest-release.outputs.latest_tag }}"
          
          echo "✅ Created PR #$PR_NUMBER"
          echo "📦 Version: $VERSION"
          echo "🔗 URL: $PR_URL"
          
          gh pr comment "$PR_NUMBER" --body "@Drjacky CLIProxyAPIPlus ${LATEST_TAG} available for review.
          
          **Changes:** Updated bundled binary from [kaitranntt/CLIProxyAPIPlus](https://github.com/kaitranntt/CLIProxyAPIPlus) (${LATEST_TAG}).
          
          **Action needed:** Please review and merge when ready.
          
          Release: https://github.com/kaitranntt/CLIProxyAPIPlus/releases/tag/${LATEST_TAG}"

      - name: Trigger auto-release workflow
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          echo "Triggering auto-release workflow to merge PR and create release..."
          gh workflow run auto-release.yml
          echo "✅ Auto-release workflow triggered"
